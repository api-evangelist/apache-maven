aid: apache-maven
name: Apache Maven
description: >-
  Apache Maven is a software project management and comprehension tool based on the concept of a project object model (POM). It provides a uniform build system, dependency management, project lifecycle, and a comprehensive plugin ecosystem for Java projects. Maven 4 is the current major version with the Maven Daemon for faster builds.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Build Tool
  - Dependency Management
  - Java
  - Project Management
  - Maven
created: '2026-03-16'
modified: '2026-04-19'
url: >-
  https://raw.githubusercontent.com/api-evangelist/apache-maven/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: apache-maven:apache-maven-core
    name: Apache Maven Core
    description: >-
      Maven provides a Java API for programmatic build execution, a Plugin API (Mojo) for extending build capabilities, a Repository API for artifact management via Maven Artifact Resolver, and the Wagon transport API for repository access. Maven 4 introduces improved APIs and the Maven Upgrade Tool for migration.
    humanURL: https://maven.apache.org/guides/index.html
    tags:
      - Build
      - Java
      - Plugins
      - Project Object Model
    properties:
      - type: Documentation
        url: https://maven.apache.org/guides/index.html
      - type: GettingStarted
        url: https://maven.apache.org/install.html
      - type: APIReference
        url: https://maven.apache.org/ref/current/
      - type: SDK
        url: https://central.sonatype.com/artifact/org.apache.maven/maven-core
        title: Maven Central (Java)
      - type: GitHubRepository
        url: https://github.com/apache/maven
  - aid: apache-maven:maven-central-repository
    name: Maven Central Repository API
    description: >-
      The Maven Central Repository (search.maven.org and central.sonatype.com) hosts millions of Java artifacts and provides a REST API and web interface for searching, browsing, and downloading dependencies. It is the default artifact repository for Maven builds.
    humanURL: https://central.sonatype.com/
    tags:
      - Artifact Repository
      - Dependency Management
      - Package Registry
    properties:
      - type: Documentation
        url: https://central.sonatype.org/publish/
      - type: Portal
        url: https://central.sonatype.com/
      - type: APIReference
        url: https://central.sonatype.com/api-doc
